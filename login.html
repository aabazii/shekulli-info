<!doctype html>
<html lang="sq">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hyrja e Redaksisë — Shekulli.info</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--paper-ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-sans);
  }
  .login-box {
    background: var(--paper);
    width: 100%;
    max-width: 400px;
    padding: 40px;
    margin: 24px;
  }
  .login-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .login-brand img { height: 48px; border-radius: 50%; }
  .login-brand-text { font-family: var(--font-display); font-weight: 900; font-size: 28px; letter-spacing: -0.02em; }
  .login-brand-sub { font-family: var(--font-sans); font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--ink-3); margin-top: 2px; }

  .login-title { font-family: var(--font-display); font-weight: 700; font-size: 22px; margin: 0 0 6px; }
  .login-sub { font-size: 13px; color: var(--ink-3); margin: 0 0 28px; }

  label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); margin-bottom: 6px; }
  input[type=password] {
    width: 100%;
    box-sizing: border-box;
    font-family: var(--font-sans);
    font-size: 15px;
    padding: 12px;
    border: 1px solid var(--rule-strong);
    border-radius: 2px;
    color: var(--ink-1);
    background: var(--paper);
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }
  input[type=password]:focus { outline: none; border-color: var(--brand-red); }

  .btn-login {
    width: 100%;
    background: var(--brand-red);
    color: #fff;
    border: none;
    padding: 13px;
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    border-radius: 2px;
    transition: background 0.2s, transform 0.12s;
  }
  .btn-login:hover { background: var(--brand-red-deep); }
  .btn-login:active { transform: translateY(1px); }

  .error {
    background: #fdf1f0;
    border: 1px solid #e8b4b0;
    color: #c0392b;
    font-size: 13px;
    padding: 10px 12px;
    margin-bottom: 16px;
    display: none;
  }
  .error.show { display: block; }

  .back { display: block; text-align: center; margin-top: 20px; font-size: 12px; color: var(--ink-3); text-decoration: none; }
  .back:hover { color: var(--ink-1); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-brand">
    <img src="assets/logo.png" alt="">
    <div>
      <div class="login-brand-text">Shekulli.info</div>
      <div class="login-brand-sub">Redaksia</div>
    </div>
  </div>

  <h1 class="login-title">Hyrja e redaktorit</h1>
  <p class="login-sub">Vetëm stafi i redaksisë ka akses në këtë panel.</p>

  <div class="error" id="error">Fjalëkalimi është i gabuar. Provoni sërish.</div>

  <form id="login-form" onsubmit="return doLogin(event)">
    <label for="password">Fjalëkalimi</label>
    <input type="password" id="password" placeholder="••••••••••••" autofocus autocomplete="current-password">
    <button type="submit" class="btn-login">Hyni →</button>
  </form>

  <a href="/" class="back">← Kthehu te faqja kryesore</a>
</div>

<script>
/* Change this to your own password */
const ADMIN_PASSWORD = 'Shekulli2026';
const SESSION_KEY = 'shekulli_admin_session';

/* Redirect to admin if already logged in */
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  const next = new URLSearchParams(location.search).get('next') || 'admin';
  location.replace(next);
}

function doLogin(e) {
  e.preventDefault();
  const input = document.getElementById('password').value;
  if (input === ADMIN_PASSWORD) {
    sessionStorage.setItem(SESSION_KEY, '1');
    const next = new URLSearchParams(location.search).get('next') || 'admin';
    location.replace(next);
  } else {
    const err = document.getElementById('error');
    err.classList.add('show');
    document.getElementById('password').value = '';
    document.getElementById('password').focus();
    /* Shake the box */
    const box = document.querySelector('.login-box');
    box.style.transition = 'transform 0.06s';
    let i = 0;
    const dirs = [-6,6,-4,4,-2,2,0];
    const shake = setInterval(() => {
      box.style.transform = 'translateX(' + (dirs[i] || 0) + 'px)';
      if (++i >= dirs.length) { clearInterval(shake); box.style.transform = ''; }
    }, 60);
  }
  return false;
}
</script>
</body>
</html>
