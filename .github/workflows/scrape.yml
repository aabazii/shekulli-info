name: Scrape Facebook Posts

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 min (backup to Vercel cron)
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Trigger Vercel scrape
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.ADMIN_PASSWORD }}" \
            -H "X-FB-Token: ${{ secrets.FB_PAGE_TOKEN }}" \
            https://shekulli.vercel.app/api/scrape \
            | cat
